<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid Topshiriq</title>
    <style>
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            background-color: #f0f0f0;
        }

  
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            gap: 15px; 
            width: 80%;
            max-width: 900px;
        }

     
        .card {
            padding: 25px;
            color: white;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
            border-radius: 15px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .header {
            background-color: #2563eb;
            grid-column: span 3; 
        }


        .orange {
            background-color: #f97316;
        }

       
        .red {
            background-color: #be123c;
            grid-column: span 2;
        }
    </style>
</head>
<body>

    <div class="grid-container">
        <div class="card header">CSS Grid Tutorial</div>
        <div class="card orange">card 2</div>
        <div class="card red">card 3</div>
        <div class="card orange">card 4</div>
        <div class="card orange">card 5</div>
        <div class="card orange">Item 6</div>
    </div>
    <h1>Jovliyev Husan</h1>
</body>
</html>
